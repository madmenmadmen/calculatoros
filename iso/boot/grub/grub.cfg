insmod all_video
insmod gfxterm

set gfxmode=auto
set gfxpayload=text

menuentry "CalculatorOS - Bare Metal Calculator" {
    multiboot /boot/kernel.bin
    boot
}

menuentry "Snake Game - Bare Metal Snake" {
    multiboot /boot/snake.bin
    boot
}

menuentry "System Information" {
    echo "CalculatorOS v1.0"
    echo "Snake Game v1.0"
    echo "Built by madmenmadmen"
    echo ""
    echo "Press any key to return to menu"
    sleep -i 5
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}